front:
  text: 二篇同卷別六
  hash: sha256:40c601708c3005e94b6fe2425de74e31603a4286085e41082276084fad951189
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0069_HFL_000-001a, image: hfl/0725/0725-004.png}
body:
  text: 悟玄篇太虛心淵篇悟玄篇序蓋人生於天地之間秉受陰陽之氣故曰有死生爲人者可鬼可仙鬼者純陰之氣仙者純陽之體以陰鍊陽甚易以陽鍊陰不難所謂學仙之士無過以陽鍊陰之術陰盡陽純則曰仙矣鍊陰有法進火有數退符有節夫人身中一竅名曰玄牝若人明得此竅則三才萬物悉備於我矣此之一竅非泥於物也其理别無他術止不過忘形滅念如守其中矣久久純熟中宫靜極則身中陽氣自然生也陽氣漸生陰氣漸剥乃曰陽長陰消之意矣予於古杭得受師傳天機不隱故以鄙句盡心泄漏於此矣使學仙之士幸垂一覽同登道岸非豈異於我哉歲在巳丑夏月朔日余洞眞序悟玄篇道本無言因言而顯其道法本無象因象而得其理得象忘言得兔忘筌何矣故曰過河須用筏到岸不須舟所謂人者秉受元陽眞氣三百八十四銖内分二十四銖散於五臟六腑以應二十四氣外分三百六十銖以應周天三百六十度元和子曰人身大抵同天地邵子曰誰把三才别立根一身别有一乾坤此之謂也蓋人子時兩腎中二氣上昇午時到心二氣交合薰蒸肝肺之液自心而來左腎之氣負戴肺液而下降右腎之氣負戴肝液亦下降矣亥時到於腎肺液到於左腎化而爲精肝液到於右腎化而爲血矣久久元氣耗散精血乾枯則曰死矣丹書曰五行順行法界火坑五行顚倒大地七寶蓋言學仙之士龍從火裏出虎向水中生此五行逆行之理也所以逆則爲聖順則爲凡故以三關之妙用一鍊精化氣爲初關二鍊氣成神爲中關三鍊神還虛爲上關虛空粉碎爲了當三關妙用要在心傳沐浴兩月玄之又玄口訣祕細未敢輕言學仙之士不遇明師指點到老無成空度歲月爾形化夫人受父精母血成胎之時中含一點元氣以爲造化之根蒂矣先生左腎次生右腎腎生心心生肝肝生肺肺生脾脾生小腸小腸生大腸五行形化而生形體具足十月胎成以就嬰兒矣今人只知形化而不知氣化所謂學仙之士只論氣化而不論形化今人多以兩腎中間爲生身處又言心腎爲水火肝肺爲𩱿𩲸脾土爲意全然非矣氣化蓋人在母胎中十月氣足其初受父母一點元氣而至於心矣其氣到心之時則發胎氣布散於外以接其生也夫鬼在於暗中渺渺茫茫不知分曉微覺在細雨宻霧之中而無一點光明遂逐靈光而去接入胎中徑入光内俱不知陰見其陽則化爲氣矣名曰太極其氣復昇之頂分爲二氣下降於左右二腎名曰兩儀乾道成男坤道成女乾坤相橐而生六子散乎於外而爲六脉六脉周流一身備矣造化悉備所以降生於世以爲人也所謂學仙之士要識生身之處立爲丹基可以超凡入聖也吾今恐言未盡故立圖以發學誠爲叅學爾陰中有陽名曰坎非腎也陽中有陰名曰離非心也坐工口訣夫學道之士不拘時候但得身心閑暇之時求於靜處瞑目閉口忌坐端耳或盤膝或不盤而坐皆可夫坐之時外忘其形而不著物累内忘其心而不著事若存其中似存不存似守不守而著於空矣久久純熟自然念定念定則陽生陽氣生則有升有降其氣升者自腰間尾閭而升直上夾脊而止藉巽風則鼓而上於頂矣二氣交合下降於舌端如蜜之甜欵欵嚥納只入中宫矣丹書曰吹噓賴巽風又曰初時須著力次候却如無總知升降不明火候之數日用工夫三關妙用沐浴玄機空延歲月到老無成矣古歌曰神仙不肯分明說悮殺閭浮多少人何也這眥道理人還識陸地神仙閙似麻所謂天機祕訣未敢泄漏於文故以口傳心授爾火燥水濫夫火燥者上升不止水濫者下降不息若有法度調和斤兩運用則火不炎燥水不汎濫自然定矣用時則有不用則無其理玄機在乎口訣既不知此妙用則何一鍊精化氣二鍊氣成神三鍊神還虛也今學道之人天下紛紛其得正傳者無有一二爾此箇道理豈可輕易授人哉沐浴十月懷胎兩月沐浴共成一載三百六十日矣且休說十月懷胎其兩箇月而沐浴安於何處矣此兩箇月而又不行火候或安於前或安於後或安於其中矣委的實用非不用也學道之士須要叅學莫泥於卯酉二月非也脫胎之時莫非口傳心授爾玄關一竅玄關竅假在其中無形無象亦無窮今人若指其安處便隔千山幾萬重若人指點心肝脾肺腎不著處却如虛處巧捏一穴其言終矣著一處却非終矣藥物精中氣血血中精精氣元同太極成莫言呼吸爲交感此物安能有死生火候進火之時頃刻一周天夫十箇月而三百日三千六百時三萬刻或刻刻行火候或時時行火候或日日行火候或時中不拘於刻或日中不拘於時但用便用但不知法度則亂升亂降則不能上矣口訣存焉中宫土生萬物心主萬事心即土也土即心也故曰中央戊已土中央即玄關一竅也了得土萬物死了得心萬事息今知學道人茫茫只向外邊尋覓却不去中心求其道也抱一脫胎吞入腹在於人間九載積行滿八百而證於仙乾坤徃來遊遍名山洞府行滿八百之日奉金書玉詔而列於班矣岀神名曰解胎學道底人總不知火候沐浴造化之備其脫胎之時莫非口傳心授爾玄關一竅玄關一竅者乃一身總要之關也此竅者即心中之心是也其心非肉心乃心中之主宰一身萬事之神也其神者無形無相非有非無也人能無私之時便是玄關一竅纔有一毫私欲不是也程子曰不偏不倚之謂中纔有偏倚便不中也杏林石眞人曰身裏有玄機心中無垢塵斯言盡矣玄關一竅萬事之宗動交於物靜養在中不無不有非色非空凝然湛定氣息流通左升白虎右發青龍齊停夾脊鼓起巽風搧開爐鞴透上崑峰乾坤交姤化作一泓降至舌端嚥入黄宫一日之内三四遍功初關百日沐浴一月中關百日沐浴前同上關百日火候數窮脫胎神化抱一養童九年行滿白日上升大道無言非有問忘形忘象求鉛汞守中一物莫存眥專意身心要守定呼吸一應便神清六脉自然朝性命精神𩲸𩱿各歸元至此身心寂不動一陽生至二陽遷只待温温行火令須臾直舉至銀河玉枕泥丸如火烘乾坤交媾降明堂項上圓光懸寶鏡如如下降至舌端滿口馨香甘液噴徐徐嚥納下黄庭遍體金光隨罩定三家相見結嬰兒一卦三二兩卦定晨昏握運仗天罡四三皆拱璇璣柄一年迸破頂𩕳門是謂超凡而入聖九年抱一行圓滿獨步翔鸞歸大洞吾今泄破聖賢機洗耳瞑心存一定莫待鉛虛汞散飛他時赴死甘心盡玄機備細剖心傳學道人人早精進藥物夫採藥者血中採取眞氣氣中採眞精血氣者到頂交合化而爲液眞精眞氣者氣至頂交合化而爲金液者流於經脉而爲白血其金者入於中宫結而成丹工夫到日一身血氣化爲白血眞精眞氣盡結以成丹體既成出神入神皆不被幻軀之累也向上一著超出陰陽之外尤存口訣是爲身外有身尤未奇特也初下手玄牝之門萬化俱忘性不忘忘無忘處妙無方這眥便是玄關竅何是泥形亂度量透關自從關竅撞通時二氣周流應化機任去任來無罣礙絲毫不動斡璇璣破境心明性徹光圓如鏡一念纔生諸相即應學道之士不可認著必屬他境故云爲甚眼中難著屑只因性裏不蔵麈念頭一動性楊波鬼面神頭見許多蓋謂寂然通感應學人不認即無魔敵魔思念相續不能斷絶鬼面神頭千般萬狀立時駕動水火二車一撞三關直透内院三尸走六賊迯移則羣魔自然散矣陣陣昏沉黑暗濛立時仗劎布罡風爐中發起三陽火掃蕩妖氛頃刻中立基釋氏工夫至此謂之打成一片晝夜不捨只管加時定力日就月將做將去了道門立基行火候煆鍊而成丹也丹基立定念頭純晝夜神光衛護身兩眼自然慵覩色一心默默守玄眞火候八竅分爲八節門温涼寒暑應乾坤四時不失陰陽火鼎内丹砂結紫雲又白眞人曰行火之士十二時設一時即五㓨也三百日内在半月計一千五百㓨也一身八㓨一周天一㓨工夫簇一年學者若知如此用飢來喫飯困時眠沐浴身中沐浴乃氣候之沐浴月中之沐浴乃丹頭之沐浴也紫陽曰兔雞之月及其時斯言者兩月沐浴也精全氣旺藥爐温二八臨門固蒂根不向抽添加火候洗心滌慮道常存又氣候來潮須當塞兌垂簾湛然無欲以待氣候過也母得縱意四散所謂不能固濟須丹傾矣工夫到此要防危不比尋常一類推氣候來潮須保養禁關閉兌守無爲靜極陽生鉛見癸生須急採採藥時用看老嫩金逢望遠不堪嘗一日衰似一日嫩如湧泉之泛上是也老如蟻行如毛細是也閉目若存中如空空不空坤宫眞氣發背上炎烘烘巽風輕鼓舞一直透天宫閉之不可放化作滿頭霐徐徐而放下大地作甘霖夫人者頭乃諸陽聚會之所其中有陰名曰眞汞五臟者乃諸陰聚會之所其中有陽名曰眞鉛蓋心者上不屬於陽下不屬於陰而得其中以爲一身之主宰視之不見其形聽之不聞其聲叩之者感而遂通中之者寂然不動人若向此不動中做工夫終至純熟則知天地造化悉備於我矣悟玄篇
